name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  contract:
    name: Contract Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/aidecks/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/aidecks/Cargo.lock') }}
      - name: Run tests
        run: cd contracts/aidecks && cargo test

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - name: Build
        run: cd frontend && npm run build
        env:
          VITE_CONTRACT_ID: CCIH2IGK6KAKRBTS4VNHAEHB4CK6OUIA3QWOCKEILVFFZ6V6N5XMITRG
          VITE_ADMIN_ADDRESS: GCXKQ77XJHWKDGZ5ENGPSJEM22XZVRVYI5WO6JBCIHZGTS7TLSRV6SWW
          VITE_SOROBAN_RPC_URL: https://soroban-testnet.stellar.org
          VITE_NETWORK_PASSPHRASE: "Test SDF Network ; September 2015"
          VITE_API_URL: https://aidecks.onrender.com/api
