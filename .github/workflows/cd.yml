name: CD

on:
  push:
    branches: [main]

jobs:
  smoke-test:
    name: Post-Deploy Smoke Test
    runs-on: ubuntu-latest
    steps:
      - name: Wait for deploys to finish
        run: sleep 180

      - name: Backend health check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://aidecks.onrender.com/api/tournaments/active)
          echo "Backend status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ Backend health check failed (got $STATUS)"
            exit 1
          fi
          echo "✅ Backend is up"

      - name: Marketplace listings check
        run: |
          RESULT=$(curl -s https://aidecks.onrender.com/api/marketplace/listings)
          echo "$RESULT" | grep -q '"success":true' && echo "✅ Marketplace OK" || (echo "❌ Marketplace failed"; exit 1)

      - name: Frontend reachability check
        continue-on-error: true
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L https://aipacks-stellar.vercel.app)
          echo "Frontend status: $STATUS"
          if [[ "$STATUS" == "200" || "$STATUS" == "304" ]]; then
            echo "✅ Frontend is up"
          else
            echo "⚠️ Frontend returned $STATUS (Vercel may still be deploying)"
          fi
